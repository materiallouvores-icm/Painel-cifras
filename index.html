<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Painel Mobile</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- TOPO -->

  <header class="topbar">

    <div class="search-area">

      <input
        type="text"
        id="searchInput"
        placeholder="Pesquisar louvor..."
      >

      <button id="searchBtn">
        Buscar
      </button>

    </div>

    <!-- RESULTADOS DA BUSCA -->

    <div id="results"></div>

  </header>

  <!-- LISTA -->

  <section class="playlist-section">

    <h2>Lista de Louvores</h2>

    <div id="playlist"></div>

  </section>

  <!-- VISUALIZADOR -->

  <div id="viewer" class="hidden">

    <button id="backBtn">
      ← Voltar
    </button>

    <img id="fullscreenImage">

  </div>

  <script src="script.js"></script>

</body>
</html>
