<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Painel Mobile</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="logo">
  CIFRAS ICM
</div>

  <!-- TOPO -->

  <header class="topbar">

    <div class="search-area">

      <input
        type="text"
        id="searchInput"
        placeholder="Pesquisar louvor..."
      >

      <button id="searchBtn">
        Buscar
      </button>

    </div>

    <!-- RESULTADOS DA BUSCA -->

    <div id="results"></div>

  </header>

  <!-- LISTA -->

  <section class="playlist-section">

    <div class="playlist-header">

  <div class="playlist-title">
    LISTA DE LOUVORES
  </div>

</div>

    <div id="playlist"></div>

  </section>

  <script src="script.js"></script>

</body>
</html>
