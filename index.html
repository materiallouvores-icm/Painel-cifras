<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>CIFRAS ICM</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- FUNDO -->

  <div class="background"></div>

  <!-- CONTEÚDO -->

  <div class="container">

    <!-- LOGO -->

    <div class="logo">
      CIFRAS ICM
    </div>

    <!-- BUSCA -->

    <div class="search-box">

      <div class="search-area">

        <input
          type="text"
          id="searchInput"
          placeholder="Pesquisar louvor..."
        >

        <button id="searchBtn">
          Buscar
        </button>

      </div>

      <!-- RESULTADOS -->

      <div id="results"></div>

    </div>

    <!-- LISTA -->

    <div class="playlist-header">

      <div class="playlist-title">
        LISTA DE LOUVORES
      </div>

    </div>

    <div id="playlist"></div>

  </div>

  <script src="script.js"></script>

</body>
</html>
